version: 2

models:
  - name: stg_customers
    description: "Cleaned and typed Telco customer records. One row per customer."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: contract_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['month-to-month', 'one year', 'two year']
      - name: has_churned
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: monthly_charges
        tests:
          - not_null
      - name: tenure_months
        tests:
          - not_null